<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kayıt Ol</title>

  <!-- CSS dosyasını bağlıyoruz -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">

    <div class="auth-card">
      <h2>Kayıt Ol</h2>
      <p>Blog sayfalarına erişmek için hesabını oluştur.</p>

      <form id="registerForm">
        <input type="email" id="email" placeholder="E-posta adresi" required>
        <input type="password" id="password" placeholder="Şifre" required>

        <button type="submit">Kayıt Ol</button>
      </form>

      <span>Zaten hesabın var mı? <a href="login.html">Giriş Yap</a></span>
    </div>

  </div>

  <!-- JS dosyasını bağlıyoruz -->
  <script src="script.js"></script>
</body>
</html>
